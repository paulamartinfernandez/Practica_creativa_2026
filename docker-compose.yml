services:
  # KAFKA
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # MONGODB
  mongo:
    image: mongo:7.0.17
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # CASSANDRA
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: flight-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 20s
      timeout: 10s
      retries: 15

  # MINIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MINIO INIT
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/flights-data
        mc mb --ignore-existing local/models
        echo "Buckets creados:"
        mc ls local
    restart: on-failure

  # DATA INIT
  data-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: data-init
    depends_on:
      cassandra:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CASSANDRA_HOST: cassandra
      MONGO_URI: mongodb://mongo:27017
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./data:/app/data
      - ./resources:/app/resources
    restart: on-failure

  # SPARK MASTER
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    hostname: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BROKER: kafka:9092
      CASSANDRA_HOST: cassandra
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      - kafka
      - mongo
      - cassandra
      - minio

  # SPARK WORKER 1
  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    hostname: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CASSANDRA_HOST: cassandra
    depends_on:
      - spark-master

  # SPARK WORKER 2
  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-2
    hostname: spark-worker-2
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CASSANDRA_HOST: cassandra
    depends_on:
      - spark-master

  # SPARK TRAINING
  spark-training:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-training
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      PROJECT_HOME: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      spark-master:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    volumes:
      - ./resources:/app/resources
    command: >
      spark-submit
      --master spark://spark-master:7077
      --packages org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=minioadmin
      --conf spark.hadoop.fs.s3a.secret.key=minioadmin
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
      /app/resources/train_spark_mllib_model.py /app

  # SPARK PREDICTION
  spark-prediction:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-prediction
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BROKER: kafka:9092
      CASSANDRA_HOST: cassandra
      PROJECT_HOME: /app
      MINIO_BUCKET_MODELS: models
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./flight_prediction:/app/flight_prediction
    command: >
      spark-submit
      --master spark://spark-master:7077
      --deploy-mode cluster
      --conf spark.driver.extraClassPath=/opt/spark/jars/spark-sql-kafka-0-10_2.12-3.5.3.jar:/opt/spark/jars/mongo-spark-connector_2.12-10.4.1.jar
      --conf spark.executor.extraClassPath=/opt/spark/jars/spark-sql-kafka-0-10_2.12-3.5.3.jar:/opt/spark/jars/mongo-spark-connector_2.12-10.4.1.jar
      --jars /opt/spark/jars/mongo-spark-connector_2.12-10.4.1.jar,/opt/spark/jars/spark-sql-kafka-0-10_2.12-3.5.3.jar
      --class es.upm.dit.ging.predictor.MakePrediction
      /app/flight_prediction/target/scala-2.12/flight_prediction_2.12-0.1.jar

# KAFKA EXPORTER
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command: --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  # PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - kafka-exporter
  # GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # MLFLOW
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow


  # FLASK WEB APP
  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask
    ports:
      - "5001:5001"
    environment:
      PROJECT_HOME: /app
      KAFKA_BROKER: kafka:9092
      MONGO_URI: mongodb://mongo:27017
      CASSANDRA_HOST: cassandra
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    volumes:
      - ./resources/web:/app/web

volumes:
  mongo_data:
  cassandra_data:
  minio_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
